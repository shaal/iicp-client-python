name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (must match pyproject.toml)"
        required: true
      fast_mode:
        description: "Skip full test matrix — single Python version, no security audit (patch/doc-only releases)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  test:
    name: Tests (pre-publish gate)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ${{ fromJson(inputs.fast_mode == 'true' && '["3.12"]' || '["3.11", "3.12"]') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install -e ".[dev]" --quiet
      - name: Verify test deps
        run: pip list | grep -E "pytest|cbor2|httpx|respx|upnpclient"
      - run: python -m ruff check src tests
      - name: Run tests (verbose + fail-fast + per-test timeout)
        # Diagnostic-friendly: -v prints each test name as it starts (so a
        # hung test reveals itself in logs); --timeout=10 + --timeout-method=
        # thread forces a SIGABRT if a single test exceeds 10s; -x stops on
        # first failure so we get the offending traceback front and centre.
        # The pyproject.toml-level timeout=30 still applies as a fallback.
        run: pytest tests/ -v --timeout=10 --timeout-method=thread -x

  conformance:
    name: Conformance Mark Coverage
    if: inputs.fast_mode != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify conformance marks
        run: |
          FAIL=0
          for f in tests/test_*.py; do
            if ! grep -q "SDK-0[1-9]\|SDK-1[0-9]\|ADR-016" "$f"; then
              echo "MISSING conformance mark: $f"
              FAIL=1
            fi
          done
          exit $FAIL

  publish:
    name: Build and publish to PyPI
    needs: [test]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # for trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: pip install build --quiet
      - name: Build sdist and wheel
        run: python -m build
      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        # Falls back to API token if OIDC trusted publishing is not configured:
        # with:
        #   password: ${{ secrets.PYPI_API_TOKEN }}
