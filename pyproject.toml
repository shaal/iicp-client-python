[project]
name = "iicp-client"
version = "0.0.1-pre"
description = "Official Python client SDK for IICP (Intent-based Inter-agent Communication Protocol)"
readme = "README.md"
license = {text = "Apache-2.0"}
authors = [
    {name = "Roble Mumin", email = "claude@roblemumin.com"}
]
requires-python = ">=3.9"
keywords = ["iicp", "ai", "protocol", "distributed", "inference"]
classifiers = [
    "Development Status :: 1 - Planning",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Topic :: System :: Networking",
]
dependencies = []

[project.urls]
Homepage = "https://iicp.network"
Repository = "https://github.com/RobLe3/iicp-client-python"
Specification = "https://github.com/RobLe3/IICP"
"Issue Tracker" = "https://github.com/RobLe3/IICP/issues"

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100
target-version = "py39"
